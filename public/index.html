<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sign Up - Detective Jai</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <div class="logo">
                <span class="logo-emoji">🕵️</span>
                <span class="logo-text">Detective Jai</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="chat.html">Chat</a>
                <a href="help.html">Help</a>
                <a href="contact.html">Contact</a>
                <a href="privacy.html">Privacy</a>
                <a href="login.html">Login</a>
                <a href="https://t.me/JoshuaGiwaBot" target="_blank" class="telegram-link">Telegram Bot</a>
            </div>
        </nav>
    </header>

    <section class="auth-section">
        <div class="container">
            <div class="auth-card">
                <h1>Create Account</h1>
                <p class="auth-subtitle">Join Detective Jai and keep your history safe</p>

                <form id="signupForm" onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="08012345678">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Create a password" required minlength="6">
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the <a href="privacy.html">Privacy Policy</a> and <a href="#">Terms of Service</a></label>
                    </div>

                    <button type="submit" class="btn-primary btn-full">Sign Up</button>
                </form>

                <p class="auth-switch">
                    Already have an account? <a href="login.html">Log in</a>
                </p>

                <div id="signupMessage" class="auth-message"></div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>© 2026 Detective Jai | Protecting Nigerians from scams</p>
        </div>
    </footer>

    <script>
        function handleSignup(event) {
            event.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('signupMessage');

            // Validation
            if (password !== confirmPassword) {
                messageDiv.textContent = '❌ Passwords do not match.';
                messageDiv.style.color = '#ef4444';
                return;
            }

            if (password.length < 6) {
                messageDiv.textContent = '❌ Password must be at least 6 characters.';
                messageDiv.style.color = '#ef4444';
                return;
            }

            messageDiv.textContent = '✅ Account created successfully! Redirecting...';
            messageDiv.style.color = '#10b981';

            // TODO: Send to backend
            // fetch('/api/signup', { method: 'POST', body: JSON.stringify({ fullName, email, phone, password }) })

            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        }
    </script>

    <style>
        .auth-section {
            padding: 60px 0 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
        }

        .auth-card {
            max-width: 420px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 40px 32px;
            border: 1px solid rgba(255,255,255,0.1);
            margin: 0 auto;
        }

        .auth-card h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            text-align: center;
        }

        .auth-subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: #cbd5e1;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #667eea;
        }

        .form-group input::placeholder {
            color: #64748b;
        }

        .form-group.checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group.checkbox input {
            width: auto;
            accent-color: #667eea;
        }

        .form-group.checkbox label {
            margin-bottom: 0;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .form-group.checkbox label a {
            color: #a78bfa;
            text-decoration: none;
        }

        .form-group.checkbox label a:hover {
            text-decoration: underline;
        }

        .btn-full {
            width: 100%;
            text-align: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 14px;
        }

        .auth-switch {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .auth-switch a {
            color: #a78bfa;
            text-decoration: none;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        .auth-message {
            text-align: center;
            margin-top: 16px;
            font-size: 0.9rem;
            min-height: 24px;
        }
    </style>
</body>
</html>
