<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sign Up - Detective Jai</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4192056018752882" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        .language-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .lang-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #cbd5e1;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }
        .lang-btn:hover {
            background: rgba(255,255,255,0.15);
        }
        .lang-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            color: white;
        }
        .auth-section {
            padding: 60px 0 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
        }
        .auth-card {
            max-width: 420px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 40px 32px;
            border: 1px solid rgba(255,255,255,0.1);
            margin: 0 auto;
        }
        .auth-card h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            text-align: center;
        }
        .auth-subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: #cbd5e1;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: #667eea;
        }
        .form-group input::placeholder {
            color: #64748b;
        }
        .form-group.checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group.checkbox input {
            width: auto;
            accent-color: #667eea;
        }
        .form-group.checkbox label {
            margin-bottom: 0;
            font-size: 0.8rem;
            color: #94a3b8;
            cursor: pointer;
        }
        .form-group.checkbox label a {
            color: #a78bfa;
            text-decoration: none;
        }
        .form-group.checkbox label a:hover {
            text-decoration: underline;
        }
        .btn-full {
            width: 100%;
            text-align: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 14px;
        }
        .btn-full:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .auth-switch {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .auth-switch a {
            color: #a78bfa;
            text-decoration: none;
        }
        .auth-switch a:hover {
            text-decoration: underline;
        }
        .auth-message {
            text-align: center;
            margin-top: 16px;
            font-size: 0.9rem;
            min-height: 24px;
        }
        .header, .footer, .nav-links, .telegram-link {
            display: flex;
            align-items: center;
        }
        .nav-links a {
            color: #cbd5e1;
            text-decoration: none;
            transition: color 0.2s;
            padding: 8px 12px;
        }
        .nav-links a:hover {
            color: #a78bfa;
        }
        .telegram-link {
            background: #0088cc;
            padding: 8px 20px;
            border-radius: 30px;
            color: white !important;
        }
        .telegram-link:hover {
            background: #00aaff;
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <div class="logo">
                <span class="logo-emoji">🕵️</span>
                <span class="logo-text">Detective Jai</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="chat.html">Chat</a>
                <a href="help.html">Help</a>
                <a href="contact.html">Contact</a>
                <a href="privacy.html">Privacy</a>
                <a href="login.html">Login</a>
                <a href="https://t.me/JoshuaGiwaBot" target="_blank" class="telegram-link">Telegram Bot</a>
            </div>
        </nav>
    </header>

    <section class="auth-section">
        <div class="container">
            <div class="auth-card">
                <h1>Create Account</h1>
                <p class="auth-subtitle">Join Detective Jai and keep your history safe</p>

                <!-- Language Selector -->
                <div class="language-selector">
                    <button class="lang-btn active" data-lang="en" onclick="setLanguage('en')">🇬🇧 English</button>
                    <button class="lang-btn" data-lang="pidgin" onclick="setLanguage('pidgin')">🇳🇬 Pidgin</button>
                    <button class="lang-btn" data-lang="yo" onclick="setLanguage('yo')">🇳🇬 Yorùbá</button>
                    <button class="lang-btn" data-lang="ha" onclick="setLanguage('ha')">🇳🇬 Hausa</button>
                </div>

                <form id="signupForm" onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label id="labelFullName">Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label id="labelEmail">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label id="labelPhone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="08012345678">
                    </div>

                    <div class="form-group">
                        <label id="labelPassword">Password</label>
                        <input type="password" id="password" placeholder="Create a password" required minlength="6">
                    </div>

                    <div class="form-group">
                        <label id="labelConfirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="terms" required>
                        <label id="labelTerms" for="terms">I agree to the <a href="privacy.html">Privacy Policy</a> and <a href="#">Terms of Service</a></label>
                    </div>

                    <button type="submit" class="btn-primary btn-full" id="signupBtn">Sign Up</button>
                </form>

                <p class="auth-switch" id="authSwitch">
                    Already have an account? <a href="login.html">Log in</a>
                </p>

                <div id="signupMessage" class="auth-message"></div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>© 2026 Detective Jai | Protecting Nigerians from scams</p>
        </div>
    </footer>

    <script>
        // ============================================
        // LANGUAGE TRANSLATIONS
        // ============================================

        const translations = {
            en: {
                title: 'Create Account',
                subtitle: 'Join Detective Jai and keep your history safe',
                fullName: 'Full Name',
                email: 'Email Address',
                phone: 'Phone Number',
                password: 'Password',
                confirmPassword: 'Confirm Password',
                terms: 'I agree to the Privacy Policy and Terms of Service',
                signUp: 'Sign Up',
                haveAccount: 'Already have an account?',
                login: 'Log in',
                namePlaceholder: 'Enter your full name',
                emailPlaceholder: 'Enter your email',
                phonePlaceholder: '08012345678',
                passwordPlaceholder: 'Create a password',
                confirmPlaceholder: 'Confirm your password',
                signUpLoading: 'Creating account...',
                waitMsg: '⏳ Please wait...'
            },
            pidgin: {
                title: 'Create Account',
                subtitle: 'Join Detective Jai make your history safe',
                fullName: 'Your Full Name',
                email: 'Email Address',
                phone: 'Phone Number',
                password: 'Password',
                confirmPassword: 'Confirm Password',
                terms: 'I agree to the Privacy Policy and Terms of Service',
                signUp: 'Sign Up',
                haveAccount: 'You get account already?',
                login: 'Log in',
                namePlaceholder: 'Enter your full name',
                emailPlaceholder: 'Enter your email',
                phonePlaceholder: '08012345678',
                passwordPlaceholder: 'Create a password',
                confirmPlaceholder: 'Confirm your password',
                signUpLoading: 'Creating account...',
                waitMsg: '⏳ Please wait...'
            },
            yo: {
                title: 'Ṣẹ́ Àkọ́ọ́lẹ̀',
                subtitle: 'Dara pọ̀ mọ́ Detective Jai kí àkọ́ọ́lẹ̀ rẹ wà láìsí ewu',
                fullName: 'Orúkọ Kíkún',
                email: 'Adírẹ́sì Ímèélì',
                phone: 'Nọ́ńbà Fóònù',
                password: 'Ọ̀rọ̀ Àṣírí',
                confirmPassword: 'Tún Ọ̀rọ̀ Àṣírí Ṣe',
                terms: 'Mo fọwọ́ sí ìlànà àṣírí àti àwọn ofin',
                signUp: 'Ṣẹ́ Àkọ́ọ́lẹ̀',
                haveAccount: 'Ṣé o ní àkọ́ọ́lẹ̀ tẹ́lẹ̀?',
                login: 'Wọlé',
                namePlaceholder: 'Ẹ fi orúkọ kíkún rẹ síbẹ̀',
                emailPlaceholder: 'Ẹ fi adírẹ́sì ímeèlì rẹ síbẹ̀',
                phonePlaceholder: '08012345678',
                passwordPlaceholder: 'Ṣẹ́ ọ̀rọ̀ àṣírí',
                confirmPlaceholder: 'Tún ọ̀rọ̀ àṣírí ṣe',
                signUpLoading: 'Ń ṣẹ́ àkọ́ọ́lẹ̀...',
                waitMsg: '⏳ Jọ̀wọ́ dúró...'
            },
            ha: {
                title: 'Ƙirƙiri Asusun',
                subtitle: 'Shiga Detective Jai don kiyaye tarihin ku',
                fullName: 'Cikakken Suna',
                email: 'Adireshin Imel',
                phone: 'Lambar Waya',
                password: 'Kalmar Sirri',
                confirmPassword: 'Tabbatar da Kalmar Sirri',
                terms: 'Na yarda da Dokar Sirri da Sharuɗɗan Sabis',
                signUp: 'Ƙirƙiri Asusun',
                haveAccount: 'Kana da asusun riga?',
                login: 'Shiga',
                namePlaceholder: 'Shigar da cikakken sunanka',
                emailPlaceholder: 'Shigar da imel ɗinka',
                phonePlaceholder: '08012345678',
                passwordPlaceholder: 'Ƙirƙiri kalmar sirri',
                confirmPlaceholder: 'Tabbatar da kalmar sirri',
                signUpLoading: 'Ana ƙirƙiri asusun...',
                waitMsg: '⏳ Da fatan za a jira...'
            }
        };

        let currentLang = 'en';

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            
            // Update buttons
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });

            // Update labels
            document.getElementById('labelFullName').textContent = t.fullName;
            document.getElementById('labelEmail').textContent = t.email;
            document.getElementById('labelPhone').textContent = t.phone;
            document.getElementById('labelPassword').textContent = t.password;
            document.getElementById('labelConfirmPassword').textContent = t.confirmPassword;
            document.getElementById('labelTerms').innerHTML = t.terms.replace('Privacy Policy', '<a href="privacy.html">Privacy Policy</a>');

            // Update placeholders
            document.getElementById('fullName').placeholder = t.namePlaceholder;
            document.getElementById('email').placeholder = t.emailPlaceholder;
            document.getElementById('phone').placeholder = t.phonePlaceholder;
            document.getElementById('password').placeholder = t.passwordPlaceholder;
            document.getElementById('confirmPassword').placeholder = t.confirmPlaceholder;

            // Update button
            document.getElementById('signupBtn').textContent = t.signUp;

            // Update switch text
            document.getElementById('authSwitch').innerHTML = `${t.haveAccount} <a href="login.html">${t.login}</a>`;

            // Update title
            document.querySelector('.auth-card h1').textContent = t.title;
            document.querySelector('.auth-subtitle').textContent = t.subtitle;

            // Save preference
            localStorage.setItem('preferredLanguage', lang);
        }

        // Load saved language preference
        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('preferredLanguage') || 'en';
            setLanguage(savedLang);
        });

        // ============================================
        // SIGNUP HANDLER
        // ============================================

        async function handleSignup(event) {
            event.preventDefault();

            const t = translations[currentLang];
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('signupMessage');
            const submitBtn = document.getElementById('signupBtn');

            messageDiv.textContent = '';
            messageDiv.style.color = '';

            if (!fullName || !email || !password) {
                messageDiv.textContent = '❌ Please fill in all required fields.';
                messageDiv.style.color = '#ef4444';
                return;
            }

            if (password !== confirmPassword) {
                messageDiv.textContent = '❌ Passwords do not match.';
                messageDiv.style.color = '#ef4444';
                return;
            }

            if (password.length < 6) {
                messageDiv.textContent = '❌ Password must be at least 6 characters.';
                messageDiv.style.color = '#ef4444';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = t.signUpLoading;
            messageDiv.textContent = t.waitMsg;
            messageDiv.style.color = '#f59e0b';

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, phone, password })
                });

                const data = await response.json();

                if (data.success) {
                    messageDiv.textContent = '✅ ' + data.message;
                    messageDiv.style.color = '#10b981';

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                } else {
                    messageDiv.textContent = '❌ ' + data.error;
                    messageDiv.style.color = '#ef4444';
                    submitBtn.disabled = false;
                    submitBtn.textContent = t.signUp;
                }
            } catch (err) {
                console.error('Signup error:', err);
                messageDiv.textContent = '❌ Network error. Please try again.';
                messageDiv.style.color = '#ef4444';
                submitBtn.disabled = false;
                submitBtn.textContent = t.signUp;
            }
        }
    </script>
</body>
</html>
