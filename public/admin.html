<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin - Detective Jai</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .admin-header h1 {
            font-size: 1.8rem;
        }

        .admin-header h1 span {
            color: #a78bfa;
        }

        .admin-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-secondary {
            background: #334155;
            color: white;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .stats {
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px 32px;
            text-align: center;
            flex: 1;
            min-width: 150px;
        }

        .stat-card h3 {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card span {
            font-size: 2.5rem;
            font-weight: 700;
            color: #a78bfa;
        }

        .table-container {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        thead th {
            text-align: left;
            padding: 12px 16px;
            color: #94a3b8;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tbody td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #cbd5e1;
            font-size: 0.85rem;
        }

        tbody tr:hover {
            background: rgba(255,255,255,0.03);
        }

        .user-id {
            font-family: monospace;
            font-size: 0.7rem;
            color: #64748b;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            transition: background 0.2s;
            font-family: inherit;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }

        .empty-state h2 {
            color: #475569;
            margin-bottom: 8px;
        }

        .access-denied {
            text-align: center;
            padding: 60px 20px;
        }

        .access-denied h2 {
            color: #ef4444;
            margin-bottom: 12px;
        }

        .access-denied p {
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: #475569;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 16px;
            }

            .admin-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats {
                flex-direction: column;
            }

            .stat-card {
                min-width: auto;
            }

            table {
                font-size: 0.75rem;
            }

            thead th,
            tbody td {
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="admin-header">
            <h1>🕵️ Admin <span>Dashboard</span></h1>
            <div class="admin-controls">
                <button class="btn btn-primary" onclick="loadUsers()">🔄 Refresh</button>
                <button class="btn btn-secondary" onclick="logout()">🚪 Logout</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <h3>Total Users</h3>
                <span id="totalUsers">--</span>
            </div>
        </div>

        <!-- Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Created</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="usersBody">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 40px; color: #94a3b8;">⏳ Loading users...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="footer">
            Detective Jai Admin Panel &bull; 2026
        </div>
    </div>

    <script>
        let adminPassword = null;

        // ============================================
        // LOAD USERS
        // ============================================

        async function loadUsers() {
            const tbody = document.getElementById('usersBody');
            const totalSpan = document.getElementById('totalUsers');

            if (!adminPassword) {
                adminPassword = prompt('🔐 Enter admin password:');
                if (!adminPassword) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6">
                                <div class="access-denied">
                                    <h2>🔒 Access Denied</h2>
                                    <p>You need the admin password to view this page.</p>
                                    <button class="btn btn-primary" onclick="retryPassword()">Try Again</button>
                                </div>
                            </td>
                        </tr>
                    `;
                    return;
                }
            }

            tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 40px; color: #94a3b8;">⏳ Loading...</td></tr>`;

            try {
                const response = await fetch(`/api/admin/users?password=${encodeURIComponent(adminPassword)}`);
                const data = await response.json();

                if (data.success) {
                    totalSpan.textContent = data.total;

                    if (data.users.length === 0) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="6">
                                    <div class="empty-state">
                                        <h2>📭 No Users</h2>
                                        <p>No registered users found.</p>
                                    </div>
                                </td>
                            </tr>
                        `;
                        return;
                    }

                    tbody.innerHTML = data.users.map(user => `
                        <tr>
                            <td><span class="user-id">${user.id}</span></td>
                            <td><strong>${user.fullName}</strong></td>
                            <td>${user.email}</td>
                            <td>${user.phone}</td>
                            <td>${new Date(user.createdAt).toLocaleDateString()}</td>
                            <td>
                                <button class="btn-delete" onclick="deleteUser('${user.id}')">Delete</button>
                            </td>
                        </tr>
                    `).join('');
                } else if (data.error === 'Invalid admin password') {
                    adminPassword = null;
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6">
                                <div class="access-denied">
                                    <h2>🔒 Invalid Password</h2>
                                    <p>${data.error}</p>
                                    <button class="btn btn-primary" onclick="retryPassword()">Try Again</button>
                                </div>
                            </td>
                        </tr>
                    `;
                } else {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 40px; color: #ef4444;">
                                ❌ ${data.error || 'Failed to load users.'}
                            </td>
                        </tr>
                    `;
                }
            } catch (err) {
                console.error('Admin error:', err);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 40px; color: #ef4444;">
                            ❌ Network error. Please try again.
                        </td>
                    </tr>
                `;
            }
        }

        // ============================================
        // RETRY PASSWORD
        // ============================================

        function retryPassword() {
            adminPassword = null;
            loadUsers();
        }

        // ============================================
        // DELETE USER
        // ============================================

        async function deleteUser(userId) {
            if (!confirm('⚠️ Delete this user permanently?')) return;

            try {
                const response = await fetch(`/api/admin/users/${userId}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (data.success) {
                    alert('✅ User deleted.');
                    loadUsers();
                } else {
                    alert('❌ ' + data.error);
                }
            } catch (err) {
                alert('❌ Network error.');
            }
        }

        // ============================================
        // LOGOUT
        // ============================================

        function logout() {
            adminPassword = null;
            localStorage.removeItem('detectiveJaiUser');
            window.location.href = 'login.html';
        }

        // ============================================
        // LOAD ON PAGE LOAD
        // ============================================

        // Check if logged in
        const user = localStorage.getItem('detectiveJaiUser');
        if (!user) {
            window.location.href = 'login.html';
        }

        loadUsers();
    </script>
</body>
</html>
