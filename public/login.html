<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - Detective Jai</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <div class="logo">
                <span class="logo-emoji">🕵️</span>
                <span class="logo-text">Detective Jai</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="chat.html">Chat</a>
                <a href="help.html">Help</a>
                <a href="contact.html">Contact</a>
                <a href="privacy.html">Privacy</a>
                <a href="signup.html">Sign Up</a>
                <a href="https://t.me/JoshuaGiwaBot" target="_blank" class="telegram-link">Telegram Bot</a>
            </div>
        </nav>
    </header>

    <section class="auth-section">
        <div class="container">
            <div class="auth-card">
                <h1>Welcome Back</h1>
                <p class="auth-subtitle">Log in to your Detective Jai account</p>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email Address</label>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                    </div>

                    <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                        <div class="checkbox" style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="remember">
                            <label for="remember" style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 0;">Remember me</label>
                        </div>
                        <a href="#" style="color: #a78bfa; font-size: 0.8rem; text-decoration: none;">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-primary btn-full">Log In</button>
                </form>

                <p class="auth-switch">
                    Don't have an account? <a href="signup.html">Sign up</a>
                </p>

                <div id="loginMessage" class="auth-message"></div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>© 2026 Detective Jai | Protecting Nigerians from scams</p>
        </div>
    </footer>

    <script>
        function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const messageDiv = document.getElementById('loginMessage');

            if (!email || !password) {
                messageDiv.textContent = '❌ Please fill in all fields.';
                messageDiv.style.color = '#ef4444';
                return;
            }

            messageDiv.textContent = '✅ Logging in...';
            messageDiv.style.color = '#10b981';

            // TODO: Send to backend
            // fetch('/api/login', { method: 'POST', body: JSON.stringify({ email, password }) })

            setTimeout(() => {
                window.location.href = 'chat.html';
            }, 1500);
        }
    </script>

    <style>
        .auth-section {
            padding: 60px 0 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
        }

        .auth-card {
            max-width: 420px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 40px 32px;
            border: 1px solid rgba(255,255,255,0.1);
            margin: 0 auto;
        }

        .auth-card h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            text-align: center;
        }

        .auth-subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: #cbd5e1;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #667eea;
        }

        .form-group input::placeholder {
            color: #64748b;
        }

        .btn-full {
            width: 100%;
            text-align: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 14px;
        }

        .auth-switch {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .auth-switch a {
            color: #a78bfa;
            text-decoration: none;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        .auth-message {
            text-align: center;
            margin-top: 16px;
            font-size: 0.9rem;
            min-height: 24px;
        }

        .checkbox label {
            margin-bottom: 0 !important;
        }
    </style>
</body>
</html>
